<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Devanshik | Sacred Prints &amp; Spiritual Essentials</title>
  <meta name="description"
    content="Sign in or create your Devanshik account to order sacred prints and spiritual accessories.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    /* ── Password field with eye toggle ── */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper .form-input {
      width: 100%;
      padding-right: 46px;
      /* space for the eye button */
    }

    .eye-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9c7c5a;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.2s ease, background 0.2s ease;
      flex-shrink: 0;
    }

    .eye-toggle:hover {
      color: var(--color-primary);
      background: rgba(193, 123, 58, 0.08);
    }

    .eye-toggle svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }
  </style>
    <link rel="icon" type="image/png" href="/assets/images/icon.png">
</head>

<body style="padding-top: 0;">
  <div id="page-loader" class="page-loader">
    <div class="spinner"></div>
    <span class="brand">Devanshik</span>
  </div>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <a href="/" class="logo" style="justify-content: center; margin-bottom: 16px;">
            <img src="/assets/images/logo.png" alt="Devanshik Logo" style="height: 56px; width: auto;">
          </a>
          <h2
            style="text-align:center; font-family:var(--font-heading); color:var(--color-primary); margin-bottom:var(--space-2);">
            Welcome back</h2>
          <p
            style="text-align:center; color:var(--color-text-muted); font-size:var(--text-sm); margin-bottom:var(--space-6);">
            Your spiritual journey continues here.</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Error message -->
        <div id="auth-error" class="hidden"
          style="background:#FEE2E2; color:var(--color-danger); padding:var(--space-3) var(--space-4); border-radius:var(--radius-md); font-size:var(--text-sm); margin-bottom:var(--space-4);">
        </div>

        <!-- Login Form -->
        <!-- NOTE: id="login-submit-btn" avoids conflict with header's #login-btn (the user icon button) -->
        <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required
              autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" class="form-input" placeholder="••••••••" required
                autocomplete="current-password">
              <button type="button" class="eye-toggle" onclick="togglePassword('login-password', this)"
                aria-label="Show password">
                <!-- Eye open icon -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-full" id="login-submit-btn">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" id="reg-fname" class="form-input" placeholder="Ramesh" required>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" id="reg-lname" class="form-input" placeholder="Sharma">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required
              autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password (min 6 characters)</label>
            <div class="password-wrapper">
              <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required minlength="6"
                autocomplete="new-password">
              <button type="button" class="eye-toggle" onclick="togglePassword('reg-password', this)"
                aria-label="Show password">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-full" id="reg-btn">Create Account</button>
        </form>

        <!-- Google auth -->
        <div class="auth-divider">or continue with</div>
        <button class="google-btn" onclick="handleGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4"
              d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2v2h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.12z" />
            <path fill="#34A853"
              d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z" />
            <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z" />
            <path fill="#EA4335"
              d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z" />
          </svg>
          Continue with Google
        </button>

        <p
          style="text-align:center; font-size:var(--text-xs); color:var(--color-text-muted); margin-top:var(--space-5);">
          By signing in you agree to our <a href="#" style="color:var(--color-primary);">Terms of Service</a> &amp;
          <a href="#" style="color:var(--color-primary);">Privacy Policy</a>.
        </p>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="/js/load-components.js"></script>
  <script>
    document.addEventListener('componentsLoaded', () => {
      document.getElementById('page-loader').classList.add('hidden');
    });

    // Redirect if already logged in
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      const snap = await db.ref(`users/${user.uid}/role`).once('value');
      const role = snap.val();
      window.location.href = role === 'admin' ? '/admin' : '/dashboard';
    });

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      clearError();
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function clearError() { document.getElementById('auth-error').classList.add('hidden'); }

    async function handleLogin(e) {
      e.preventDefault(); clearError();
      const btn = document.getElementById('login-submit-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        await signInWithEmail(
          document.getElementById('login-email').value.trim(),
          document.getElementById('login-password').value
        );
        // onAuthStateChanged above will redirect
      } catch (err) {
        showError(friendlyError(err.code));
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault(); clearError();
      const btn = document.getElementById('reg-btn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      const name = (document.getElementById('reg-fname').value.trim() + ' ' + document.getElementById('reg-lname').value.trim()).trim();
      try {
        await registerWithEmail(name, document.getElementById('reg-email').value.trim(), document.getElementById('reg-password').value);
        window.location.href = '/dashboard';
      } catch (err) {
        showError(friendlyError(err.code));
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    async function handleGoogle() {
      clearError();
      try { await signInWithGoogle(); }
      catch (err) { showError(friendlyError(err.code)); }
    }

    function friendlyError(code) {
      const map = {
        'auth/wrong-password': 'Incorrect password. Please try again.',
        'auth/user-not-found': 'No account found with this email.',
        'auth/email-already-in-use': 'This email is already registered. Please sign in.',
        'auth/weak-password': 'Password must be at least 6 characters.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
        'auth/invalid-credential': 'Incorrect email or password.',
        'auth/too-many-requests': 'Too many failed attempts. Please wait a moment and try again.',
        'auth/network-request-failed': 'Network error. Please check your connection.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    // ── Password eye toggle ──────────────────────────────────────
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');

      // Swap icon: eye-open ↔ eye-off
      btn.innerHTML = isHidden
        ? /* eye-off (slash through eye) */ `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>`
        : /* eye-open */ `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>`;
    }
  </script>

</body>

</html>
